# ~/.tmux.conf — jonhoo-style gruvbox dark minimal

# modern terminal colors
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",alacritty:Tc"

# unbind default prefix and bind to C-a (like screen)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# mouse + vi mode keys
set -g mouse on
set -g mode-keys vi

# window/pane numbering starts at 1 (not 0)
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# move between panes with vi keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# avoid ESC delay
set -sg escape-time 10

######################
### GRUVBOX DARK STATUS BAR (jonhoo-style)
######################

# default statusbar — dark gray bg, warm beige text
set-option -g status-style "fg=#bdae93,bg=#3c3836"

# window titles
set-window-option -g window-status-style "fg=#bdae93,bg=default"
set-window-option -g window-status-current-style "fg=#fabd2f,bg=default"

# pane borders — nearly invisible
set-option -g pane-border-style "fg=#3c3836"
set-option -g pane-active-border-style "fg=#504945"

# message text
set-option -g message-style "fg=#d5c4a1,bg=#3c3836"

# remove clock/date from right side — no distraction
set -g status-right ''
set -g status-right-length 0

# copy mode highlight
set-window-option -g mode-style "fg=#bdae93,bg=#504945"

# bell
set-window-option -g window-status-bell-style "fg=#3c3836,bg=#fb4934"
